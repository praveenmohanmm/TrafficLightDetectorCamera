name: Build & Release APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.0). Leave blank to use build number.'
        required: false
        default: ''

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build:
    name: Build APK and publish release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source code ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java toolchain ────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Gradle wrapper (generated from the pre-installed Gradle CLI) ──────
      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version=8.2 --distribution-type=bin
          chmod +x gradlew

      # ── 4. Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 5. Download TFLite model into assets ─────────────────────────────────
      - name: Download EfficientDet-Lite0 model
        run: bash scripts/download_model.sh

      # ── 6. Build ─────────────────────────────────────────────────────────────
      #   • Signed release APK — used when KEYSTORE_BASE64 secret is set.
      #   • Debug APK          — fallback when no signing secrets exist.

      - name: Build release APK (signed)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64:     ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:           ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:        ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:      ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/keystore.jks" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Build debug APK (no signing secrets)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        run: ./gradlew assembleDebug

      # ── 7. Locate built APK ──────────────────────────────────────────────────
      - name: Find APK path
        id: apk
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $APK)" >> "$GITHUB_OUTPUT"

      # ── 8. Compute release tag ───────────────────────────────────────────────
      - name: Compute release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=build-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      # ── 9. Publish GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.tag.outputs.value }}
          name:       "Traffic Pole Detector — ${{ steps.tag.outputs.value }}"
          body: |
            ## Traffic Light / Pole Detector

            ### Install (Android sideload)
            1. Download **${{ steps.apk.outputs.name }}** below.
            2. On your Android device go to **Settings → Install unknown apps** and allow your browser/file manager.
            3. Open the downloaded APK and tap **Install**.
            4. Grant camera permission when prompted.

            > **Built from commit:** `${{ github.sha }}`
            > **Run:** #${{ github.run_number }}
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: false
          make_latest: true
