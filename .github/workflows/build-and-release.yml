name: Build & Release APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.0). Leave blank to use build number.'
        required: false
        default: ''

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build:
    name: Build APK and publish release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source code ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java toolchain ────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Gradle wrapper ────────────────────────────────────────────────────
      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version=8.2 --distribution-type=bin
          chmod +x gradlew

      # ── 4. Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 5. Download TFLite model into assets ─────────────────────────────────
      - name: Download EfficientDet-Lite0 model
        run: bash scripts/download_model.sh

      # ── 6. Prepare signing keystore ──────────────────────────────────────────
      #   • If KEYSTORE_BASE64 secret is set → decode it (your own release key)
      #   • Otherwise                        → generate a fresh self-signed key
      #   Either way, STORE_FILE / STORE_PASS / KEY_ALIAS / KEY_PASS are exported
      #   so step 7 always builds a proper signed release APK.
      - name: Prepare keystore
        id: ks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:       ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:    ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:  ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Using repository signing key"
            echo "$KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/keystore.jks"
            echo "store_file=$GITHUB_WORKSPACE/keystore.jks" >> "$GITHUB_OUTPUT"
            echo "store_pass=$STORE_PASSWORD"                >> "$GITHUB_OUTPUT"
            echo "key_alias=$KEY_ALIAS"                     >> "$GITHUB_OUTPUT"
            echo "key_pass=$KEY_PASSWORD"                   >> "$GITHUB_OUTPUT"
          else
            echo "No signing secret found — generating a self-signed keystore"
            keytool -genkey -v \
              -keystore "$GITHUB_WORKSPACE/keystore.jks" \
              -alias    "traffic-detector" \
              -keyalg   RSA -keysize 2048 -validity 10000 \
              -storepass "ci_store_pass" \
              -keypass   "ci_key_pass" \
              -dname     "CN=CI Build, OU=CI, O=TrafficLightDetector, L=Unknown, ST=Unknown, C=US"
            echo "store_file=$GITHUB_WORKSPACE/keystore.jks" >> "$GITHUB_OUTPUT"
            echo "store_pass=ci_store_pass"                  >> "$GITHUB_OUTPUT"
            echo "key_alias=traffic-detector"                >> "$GITHUB_OUTPUT"
            echo "key_pass=ci_key_pass"                      >> "$GITHUB_OUTPUT"
          fi

      # ── 7. Build signed release APK ──────────────────────────────────────────
      - name: Build release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="${{ steps.ks.outputs.store_file }}" \
            -Pandroid.injected.signing.store.password="${{ steps.ks.outputs.store_pass }}" \
            -Pandroid.injected.signing.key.alias="${{ steps.ks.outputs.key_alias }}" \
            -Pandroid.injected.signing.key.password="${{ steps.ks.outputs.key_pass }}"

      # ── 8. Locate built APK ──────────────────────────────────────────────────
      - name: Find APK path
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $APK)" >> "$GITHUB_OUTPUT"

      # ── 9. Compute release tag ───────────────────────────────────────────────
      - name: Compute release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=build-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      # ── 10. Publish GitHub Release ───────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.tag.outputs.value }}
          name:       "Traffic Pole Detector — ${{ steps.tag.outputs.value }}"
          body: |
            ## Traffic Light / Pole Detector

            ### Install (Android sideload)
            1. Download **${{ steps.apk.outputs.name }}** below.
            2. On your Android device go to **Settings → Install unknown apps** and allow your browser/file manager.
            3. Open the downloaded APK and tap **Install**.
            4. Grant camera permission when prompted.

            > **Built from commit:** `${{ github.sha }}`
            > **Run:** #${{ github.run_number }}
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: false
          make_latest: true
