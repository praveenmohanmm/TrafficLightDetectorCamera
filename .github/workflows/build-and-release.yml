name: Build & Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag / version name (e.g. v1.2.0). Leave blank → auto build-NNN.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build APK + AAB and publish release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source code ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java toolchain ────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Gradle wrapper ────────────────────────────────────────────────────
      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version=8.2 --distribution-type=bin
          chmod +x gradlew

      # ── 4. Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 5. Download TFLite model into assets ─────────────────────────────────
      - name: Download EfficientDet-Lite0 model
        run: bash scripts/download_model.sh

      # ── 6. Compute version strings ───────────────────────────────────────────
      - name: Compute version
        id: version
        run: |
          BUILD=${{ github.run_number }}
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="v1.0.${BUILD}"
          fi
          echo "tag=${TAG}"          >> "$GITHUB_OUTPUT"
          echo "build=${BUILD}"      >> "$GITHUB_OUTPUT"
          echo "name=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "Version: ${TAG}  (versionCode=${BUILD})"

      # ── 7. Prepare keystore ──────────────────────────────────────────────────
      #   Real key  → decode KEYSTORE_BASE64 secret
      #   No secret → generate a self-signed key (good enough for testing)
      - name: Prepare keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:       ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:    ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:  ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "KEYSTORE_BASE64 present: $([ -n "$KEYSTORE_BASE64" ] && echo YES || echo NO)"
          echo "KEY_ALIAS present:       $([ -n "$KEY_ALIAS" ]       && echo YES || echo NO)"
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Using repository signing key"
            echo "$KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/keystore.jks"
            cat > "$GITHUB_WORKSPACE/keystore.properties" <<EOF
          storeFile=$GITHUB_WORKSPACE/keystore.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          else
            echo "No signing secret — generating self-signed keystore"
            keytool -genkey -v \
              -keystore "$GITHUB_WORKSPACE/keystore.jks" \
              -alias    "ci-key" \
              -keyalg   RSA -keysize 2048 -validity 10000 \
              -storetype PKCS12 \
              -storepass "ci_pass" \
              -keypass   "ci_pass" \
              -dname     "CN=CI Build, OU=CI, O=TrafficLightDetector, L=Unknown, ST=Unknown, C=US"
            cat > "$GITHUB_WORKSPACE/keystore.properties" <<EOF
          storeFile=$GITHUB_WORKSPACE/keystore.jks
          storePassword=ci_pass
          keyAlias=ci-key
          keyPassword=ci_pass
          EOF
          fi

      # ── 8. Build signed release APK + AAB ───────────────────────────────────
      #   APK  → for sideloading / direct download
      #   AAB  → for Google Play Store submission
      - name: Build release APK and AAB
        env:
          BUILD_NUMBER: ${{ steps.version.outputs.build }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
        run: ./gradlew assembleRelease bundleRelease

      # ── 9. Locate output files ───────────────────────────────────────────────
      - name: Find APK path
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $APK)" >> "$GITHUB_OUTPUT"

      - name: Find AAB path
        id: aab
        run: |
          AAB=$(find app/build/outputs/bundle/release -name "*.aab" | head -1)
          echo "path=$AAB" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $AAB)" >> "$GITHUB_OUTPUT"

      # ── 10. Publish GitHub Release ───────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name:     "Traffic Light Detector ${{ steps.version.outputs.name }}"
          body: |
            ## Traffic Light Detector ${{ steps.version.outputs.name }}

            | Artifact | Use for |
            |---|---|
            | **${{ steps.apk.outputs.name }}** | Sideload / direct install on Android |
            | **${{ steps.aab.outputs.name }}** | Google Play Store upload |

            ### Sideload install
            1. Download the `.apk` file to your Android device.
            2. Go to **Settings → Install unknown apps** and allow your browser / file manager.
            3. Open the downloaded APK and tap **Install**.
            4. Grant **Camera** and **Location** permissions when prompted.

            > **Version:** `${{ steps.version.outputs.name }}` (build ${{ github.run_number }})
            > **Commit:** `${{ github.sha }}`
          files: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.aab.outputs.path }}
          draft:      false
          prerelease: false
          make_latest: true
